name: BBMA Scanner

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas numpy requests

    - name: Ensure alert cache exists
      run: |
        if [ ! -f alert_cache.json ]; then
          echo "{}" > alert_cache.json
        fi

    - name: Run BBMA Scanner
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        ALERT_CACHE_PATH: alert_cache.json
      run: python bbma_scanner.py

    - name: Save alert cache
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add alert_cache.json
        git diff --cached --quiet || git commit -m "chore: update alert cache [skip ci]"
        git push
