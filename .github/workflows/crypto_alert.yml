name: MACD Supertrend Alert

on:
  schedule:
    - cron: '0 0 * * *'   # setiap hari 00:00 UTC
  workflow_dispatch:       # boleh trigger manual

jobs:
  check-signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python script.py

      - name: Commit updated signal state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update signal state [skip ci]"
          file_pattern: signal_state.txt
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
