name: Heartbeat Alert

on:
  schedule:
    - cron: '0 * * * *'   # setiap jam pada minit 0
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Send heartbeat to Telegram
        run: |
          MESSAGE="✅ Bot aktif. Tiada isyarat baru. Jam: $(date -u +"%Y-%m-%d %H:%M UTC")"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\":\"$MESSAGE\", \"parse_mode\":\"HTML\"}"
